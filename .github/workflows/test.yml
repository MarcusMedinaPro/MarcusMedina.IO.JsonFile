# Test Workflow Template
# Full kvalitetskontroll på test-grenen: bygg, test, CodeQL, sårbarhetsscan.
# Används före merge till main för att fånga problem tidigt.

name: 🔍 Test — Unit Tests + Code Quality

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: 1️⃣ Build & Test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore
        working-directory: ./csharp

      - name: Build
        run: dotnet build --configuration Release --no-restore
        working-directory: ./csharp

      - name: Test
        run: |
          dotnet test \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger trx
        working-directory: ./csharp

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: '**/TestResults/**/*.trx'

  quality-gate:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: 2️⃣ Code Quality

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore
        working-directory: ./csharp

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Build for CodeQL
        run: dotnet build --configuration Release --no-restore
        working-directory: ./csharp

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Dependency Vulnerability Scan
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt
        continue-on-error: true
        working-directory: ./csharp

      - name: Upload quality reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: quality-reports
          path: vulnerability-report.txt
